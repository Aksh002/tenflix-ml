version: 4
seed: 42
paths:
  ratings: ratings.csv
  movies: movies.csv
  prepared_dir: data/processed-v4
  artifacts_dir: artifacts
data:
  chunk_size: 1000000
  rating_min: 0.5
  rating_max: 5.0
lifecycle:
  cold_max: 19
  sparse_max: 49
split:
  train_quantile: 0.80
  validation_quantile: 0.90
model:
  factors: 32
  learning_rate: 0.01
  factor_regularization: 0.05
  bias_regularization: 0.03
  epochs: 12
  early_stopping_patience: 3
  min_relevant_rating: 4.0
  fold_in_regularization: 0.10
temporal:
  session_gap_hours: 24
  minimum_sessions: 3
  minimum_lifespan_days: 90
  minimum_window_ratings: 5
  recent_window_days: 180
  recent_half_life_days: 45
  maximum_recent_weight: 0.85
  sigmoid_intercept: -1.0
  sigmoid_latent_weight: 1.0
  sigmoid_genre_weight: 1.0
  sigmoid_activity_weight: 0.5
content:
  min_df: 2
  max_df: 0.95
  negative_penalty: 0.40
  mean_prior_strength: 5.0
candidates:
  collaborative: 200
  content: 100
  quality_popularity: 75
  recent: 50
  exploration: 35
reranker:
  freshness_floor: 0.25
  freshness_half_life_years: 15
  maximum_freshness_weight: 0.10
  diversity_lambda: 0.08
  weights:
    new: {content: 0.44, quality: 0.18, popularity: 0.08, novelty: 0.05, freshness: 0.08, release_year_affinity: 0.10, source_agreement: 0.05, exploration_jitter: 0.02}
    cold: {predicted_rating: 0.15, content: 0.35, negative_similarity: -0.12, quality: 0.16, popularity: 0.06, novelty: 0.02, freshness: 0.05, release_year_affinity: 0.08, source_agreement: 0.04, exploration_jitter: 0.01}
    sparse: {predicted_rating: 0.32, collaborative: 0.18, content: 0.20, negative_similarity: -0.10, quality: 0.12, popularity: 0.05, novelty: 0.01, freshness: 0.03}
    mature_temporal_ineligible: {predicted_rating: 0.48, collaborative: 0.22, content: 0.10, negative_similarity: -0.08, quality: 0.10, popularity: 0.04, freshness: 0.02}
    mature_temporal_eligible: {predicted_rating: 0.38, collaborative: 0.18, recent_content: 0.15, content: 0.08, negative_similarity: -0.08, quality: 0.09, popularity: 0.03, freshness: 0.02, temporal_confidence: 0.05}
evaluation:
  v3_reference_run: artifacts/movielens-v3-eval
  k_values: [10, 20]
  max_users: 10000
  bootstrap_samples: 500
  confidence: 0.95
  new_start_noninferiority_margin: -0.01
  minimum_coverage: 0.15
  minimum_diversity: 0.50
  recommendation_p95_ms: 250
  fold_in_recommendation_p95_ms: 500
tuning:
  enabled: true
  sample_users: 20000
  factors: [32, 64]
  learning_rates: [0.005, 0.01]
  factor_regularizations: [0.02, 0.05]
  bias_regularizations: [0.01, 0.03]
